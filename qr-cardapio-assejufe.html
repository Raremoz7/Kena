<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QR Cardápio — Assejufe</title>
    <script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>
    <style>
        :root {
            --azul: #1E50A2;       /* azul Assejufe */
            --azul-soft: #4a78c4;
            --laranja: #E95127;    /* laranja Manda (igual ao logo) */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { background: #e9eef5; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 24px;
            color: var(--azul);
        }

        /* Cartão quadrado */
        .cartao {
            width: 200mm;
            height: 200mm;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 16mm 16mm;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12);
        }

        .topo { text-align: center; }

        .kicker {
            font-size: 15pt;
            font-weight: 700;
            letter-spacing: 0.32em;
            text-transform: uppercase;
            color: var(--azul-soft);
            margin-bottom: 5mm;
        }

        .titulo {
            font-size: 52pt;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.02em;
            white-space: nowrap;
            color: var(--azul);
        }

        .subtitulo {
            margin-top: 5mm;
            font-size: 17pt;
            font-weight: 600;
            line-height: 1.3;
            color: var(--azul);
            max-width: 145mm;
        }

        /* QR */
        .qr-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5mm;
            margin: 4mm 0;
        }

        .qr-moldura {
            padding: 8mm;
            border: 3px solid var(--azul);
            border-radius: 20px;
            background: #fff;
        }

        #qr canvas, #qr svg { display: block; }

        .escaneie {
            font-size: 15pt;
            font-weight: 800;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--azul);
        }

        /* Rodapé Manda */
        .rodape {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3mm;
        }

        .logo-manda {
            width: 62mm;
            height: auto;
            display: block;
        }

        .link-manda {
            font-size: 16pt;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--laranja);
        }

        /* Impressão */
        @media print {
            html, body { background: #fff; padding: 0; }
            body { padding: 0; align-items: center; min-height: 100vh; }
            .cartao { box-shadow: none; }
            @page { size: A4 portrait; margin: 0; }
        }
    </style>
</head>
