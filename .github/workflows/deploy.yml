name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /var/www/kena
            DEPLOY_USER="$(id -un)"

            echo ">>> Atualizando codigo (origin/main)..."
            git fetch origin main
            git reset --hard origin/main

            echo ">>> Instalando dependencias PHP (composer)..."
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

            echo ">>> Limpando caches Laravel..."
            php artisan optimize:clear

            echo ">>> Garantindo pastas de runtime..."
            mkdir -p storage/framework/{cache,sessions,views} storage/logs bootstrap/cache
            php artisan storage:link || true

            echo ">>> Ajustando permissoes..."
            sudo chown -R "${DEPLOY_USER}:www-data" /var/www/kena
            sudo chmod -R ug+rwX storage bootstrap/cache

            echo ">>> Instalando dependencias JS..."
            npm ci

            # O vite limpa public/build ANTES de gerar. Se o build falhar no meio
            # (ex.: timeout buscando fontes remotas), o manifest some e o site
            # inteiro cai com 500. Entao: guarda o build atual, tenta de novo uma
            # vez (cobre falha de rede transitoria) e restaura se nao der.
            echo ">>> Build dos assets (Vite)..."
            rm -rf /tmp/kena-build-anterior
            if [ -d public/build ]; then
              cp -r public/build /tmp/kena-build-anterior
            fi

            if ! npm run build; then
              echo ">>> Build falhou. Tentando mais uma vez..."
              if ! npm run build; then
                echo ">>> Build falhou de novo. Restaurando assets anteriores."
                rm -rf public/build
                if [ -d /tmp/kena-build-anterior ]; then
                  mv /tmp/kena-build-anterior public/build
                  php artisan optimize
                  echo ">>> Site restaurado na versao anterior dos assets."
                fi
                exit 1
              fi
            fi
            rm -rf /tmp/kena-build-anterior

            echo ">>> Executando migracoes..."
            php artisan migrate --force

            echo ">>> Otimizando app..."
            php artisan optimize

            # O :* e obrigatorio: numprocs>1 cria um grupo, e restart sem ele
            # falha com "no such process" e o worker segue com o codigo antigo.
            echo ">>> Reiniciando worker da fila..."
            sudo supervisorctl restart kena-worker:*

            echo ">>> Deploy concluido."
